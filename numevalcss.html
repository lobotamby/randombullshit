<!doctype HTML>
<head>
    <meta charset="UTF-8">
    <title>Number evaluation</title>
    <style>
        @keyframes lala {
            from {transform:rotate(0deg);}
            to {transform:rotate(360deg);}
        }
        body {
            background:burlywood;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h2, div, button {
            background:white;
            border-radius:15px;
            padding:2px;
            padding-left:15px;
            box-shadow:darkred 5px 5px;
            border:black 2px solid;
        }
        h2 {
            align-content:space-between;
        }
        input {
            border:black 2px solid;
        }
        input:hover, input:active {
            background:lightgrey;
        }
        button {
            background:brown;
            box-shadow:none;
            padding-left:0;
            padding:5px;
            border:black 2px solid;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        button:hover {
            background:red;
            box-shadow:black 2px 2px;
            font-weight:normal;
            color:white;
            cursor:pointer;
        }
        button:active {
            background:brown;
        }
        .funny {
            width:30px;
            position:absolute;
            right:5%;
        }
        .funny:hover {
            animation-name:lala;
            animation-duration:5s;
            animation-timing-function: cubic-bezier(0.75, 0.082, 0.165, 1);
        }
    </style>
</head>
<body>
    <h2>
        Ambrož's JS number evaluator
        <img src="https://f2.toyhou.se/file/f2-toyhou-se/images/99961513_3U6akD0HKnVi6ZU.gif" class="funny">
    </h2>
    <div>
    <p>
        Hi!! This is my test at JavaScript. :-&rpar;
    </p>
    <input id="field"></input>
    <button onclick="analysis()">Evalute</button>
    <p id="output"></p>
    </div>
    <script>
        function analysis() {
            let input = document.getElementById("field").value;
            let result = checkNumber(input);
           function checkNumber(value) {
            return (value % 2 === 0)
        }
            if (isNaN(input) == true) {
                document.getElementById("output").textContent = "Not a number."
                return
            }
            if ((input) == "") {
                document.getElementById("output").textContent = "Nothing entered."
                return
            }
            if (result == true) {
                document.getElementById("output").textContent = "Even."
            }
            if (result == false) {
                document.getElementById("output").textContent = "Odd."
            }
        }
    </script>
</body>
