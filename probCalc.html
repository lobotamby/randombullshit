<script>
    let probA, probB, probC
    let testProb
    const input = document.getElementById("testing")
    function updateTest() {
        function toDecimal(of) {
            const str = String(of)
            if (str.length > 15) {return "That's really long. Stop doing that"}
        if (str.toLowerCase().includes("in") == true) {
            return splitFormat("in");
        }
        else if (str.toLowerCase().includes("out of") == true) {
            return splitFormat("out of");
        }
        if (str.includes("/") == true) {
            return splitFormat("/")
        }
        function splitFormat(by) {
            let parts = str.split(String(by));
            console.log(parts[0] + " and " + parts[1])
            let prob = parts[0] / parts[1]
            return prob
        }
        if (str.includes("%") == true) {
            if (str.length == 2) {return "0.0" + str.slice(0, -1)}
            if (str.length == 3) {return "0." + str.slice(0, -1)}
            else {return null}
        }
        if (str.includes(".") == true && Number(str) !== NaN) {
            return str
        }
        else {return null}
    } 
    testProb = toDecimal(input.value)
    document.getElementById("testResult").textContent = testProb
    }
</script>
